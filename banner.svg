<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&amp;family=Share+Tech+Mono&amp;display=swap');

      .rain-col { opacity: 0.55; }

      @keyframes glitch-main {
        0%,78%,100% { transform: translate(0,0); filter: none; }
        80% { transform: translate(-3px,1px); filter: hue-rotate(90deg); }
        82% { transform: translate(3px,-2px); filter: hue-rotate(-90deg); }
        84% { transform: translate(-1px,0); }
        86% { transform: translate(0,0); }
      }
      @keyframes glitch-shadow1 {
        0%,78%,100% { transform: translate(0,0); opacity:0; }
        80% { transform: translate(4px,0); opacity:0.7; }
        86% { opacity:0; }
      }
      @keyframes glitch-shadow2 {
        0%,80%,100% { transform: translate(0,0); opacity:0; }
        82% { transform: translate(-4px,2px); opacity:0.6; }
        86% { opacity:0; }
      }
      @keyframes blink {
        0%,49%  { opacity:1; }
        50%,100%{ opacity:0; }
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity:0.06; }
        100% { transform: translateY(290px); opacity:0.06; }
      }
      @keyframes fade-in {
        from { opacity:0; } to { opacity:1; }
      }
      @keyframes subtitle-in {
        from { opacity:0; letter-spacing:30px; }
        to   { opacity:1; letter-spacing:7px; }
      }

      .name-main  { animation: glitch-main 6s infinite; }
      .name-red   { animation: glitch-shadow1 6s infinite; }
      .name-cyan  { animation: glitch-shadow2 6s infinite; }
      .cursor     { animation: blink 1s step-end infinite; }
      .scanline   { animation: scan 4s linear infinite; }
      .subtitle   { animation: subtitle-in 1.8s ease forwards; animation-delay:0.6s; opacity:0; }
      .tagline    { animation: fade-in 1s ease forwards; animation-delay:1.6s; opacity:0; }
    </style>

    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#040806"/>
      <stop offset="50%"  stop-color="#050b07"/>
      <stop offset="100%" stop-color="#030504"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5d97a"/>
      <stop offset="50%"  stop-color="#c9972a"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
    <linearGradient id="it-flag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"     stop-color="#009246"/>
      <stop offset="33.3%"  stop-color="#009246"/>
      <stop offset="33.3%"  stop-color="#f1f1f1"/>
      <stop offset="66.6%"  stop-color="#f1f1f1"/>
      <stop offset="66.6%"  stop-color="#ce2b37"/>
      <stop offset="100%"   stop-color="#ce2b37"/>
    </linearGradient>

    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-all"><rect width="900" height="280"/></clipPath>
  </defs>

  <g clip-path="url(#clip-all)">

    <!-- Background -->
    <rect width="900" height="280" fill="url(#bg-grad)"/>

    <!-- Subtle grid -->
    <g opacity="0.04" stroke="#00ff41" stroke-width="0.5">
      <line x1="0" y1="40"  x2="900" y2="40"/>
      <line x1="0" y1="80"  x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="100" y1="0" x2="100" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="400" y1="0" x2="400" y2="280"/>
      <line x1="500" y1="0" x2="500" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="700" y1="0" x2="700" y2="280"/>
      <line x1="800" y1="0" x2="800" y2="280"/>
    </g>

    <!-- Matrix rain columns -->
    <g class="rain-col" font-family="'Share Tech Mono',monospace" font-size="13" fill="#00ff41">

      <!-- col 1 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-220;0,280" dur="3.4s" repeatCount="indefinite" begin="-0.5s"/>
        <text x="22" y="0">ア</text><text x="22" y="16">1</text><text x="22" y="32">0</text><text x="22" y="48">カ</text><text x="22" y="64">F</text><text x="22" y="80">1</text><text x="22" y="96">ウ</text><text x="22" y="112">0</text><text x="22" y="128">B</text><text x="22" y="144">イ</text><text x="22" y="160">1</text><text x="22" y="176">$</text><text x="22" y="192">ケ</text><text x="22" y="208">0</text>
      </g>

      <!-- col 2 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-240;0,280" dur="4.1s" repeatCount="indefinite" begin="-2.1s"/>
        <text x="50" y="0">1</text><text x="50" y="16">コ</text><text x="50" y="32">A</text><text x="50" y="48">0</text><text x="50" y="64">エ</text><text x="50" y="80">7</text><text x="50" y="96">1</text><text x="50" y="112">キ</text><text x="50" y="128">C</text><text x="50" y="144">0</text><text x="50" y="160">オ</text><text x="50" y="176">1</text><text x="50" y="192">#</text><text x="50" y="208">D</text>
      </g>

      <!-- col 3 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-200;0,280" dur="2.9s" repeatCount="indefinite" begin="-1.2s"/>
        <text x="80" y="0">@</text><text x="80" y="16">ア</text><text x="80" y="32">E</text><text x="80" y="48">1</text><text x="80" y="64">カ</text><text x="80" y="80">0</text><text x="80" y="96">F</text><text x="80" y="112">ウ</text><text x="80" y="128">1</text><text x="80" y="144">B</text><text x="80" y="160">ア</text><text x="80" y="176">0</text><text x="80" y="192">3</text><text x="80" y="208">ケ</text>
      </g>

      <!-- col 4 (faded) -->
      <g opacity="0.3"><animateTransform attributeName="transform" type="translate" values="0,-260;0,280" dur="5.0s" repeatCount="indefinite" begin="-3.0s"/>
        <text x="112" y="0">1</text><text x="112" y="16">0</text><text x="112" y="32">イ</text><text x="112" y="48">C</text><text x="112" y="64">1</text><text x="112" y="80">ア</text><text x="112" y="96">0</text><text x="112" y="112">A</text><text x="112" y="128">1</text><text x="112" y="144">オ</text><text x="112" y="160">7</text><text x="112" y="176">0</text><text x="112" y="192">カ</text><text x="112" y="208">1</text>
      </g>

      <!-- col 5 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-180;0,280" dur="3.7s" repeatCount="indefinite" begin="-0.9s"/>
        <text x="142" y="0">F</text><text x="142" y="16">ア</text><text x="142" y="32">1</text><text x="142" y="48">0</text><text x="142" y="64">コ</text><text x="142" y="80">B</text><text x="142" y="96">1</text><text x="142" y="112">ウ</text><text x="142" y="128">$</text><text x="142" y="144">0</text><text x="142" y="160">エ</text><text x="142" y="176">1</text><text x="142" y="192">D</text><text x="142" y="208">ア</text>
      </g>

      <!-- col 6 (very faded) -->
      <g opacity="0.2"><animateTransform attributeName="transform" type="translate" values="0,-230;0,280" dur="4.5s" repeatCount="indefinite" begin="-2.5s"/>
        <text x="175" y="0">0</text><text x="175" y="16">キ</text><text x="175" y="32">1</text><text x="175" y="48">ア</text><text x="175" y="64">E</text><text x="175" y="80">0</text><text x="175" y="96">1</text><text x="175" y="112">カ</text><text x="175" y="128">A</text><text x="175" y="144">0</text><text x="175" y="160">ウ</text><text x="175" y="176">3</text><text x="175" y="192">1</text><text x="175" y="208">コ</text>
      </g>

      <!-- col 7 - right side -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-210;0,280" dur="3.1s" repeatCount="indefinite" begin="-1.7s"/>
        <text x="718" y="0">1</text><text x="718" y="16">ア</text><text x="718" y="32">0</text><text x="718" y="48">F</text><text x="718" y="64">カ</text><text x="718" y="80">1</text><text x="718" y="96">イ</text><text x="718" y="112">C</text><text x="718" y="128">0</text><text x="718" y="144">ウ</text><text x="718" y="160">7</text><text x="718" y="176">1</text><text x="718" y="192">エ</text><text x="718" y="208">B</text>
      </g>

      <!-- col 8 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-250;0,280" dur="4.3s" repeatCount="indefinite" begin="-3.3s"/>
        <text x="748" y="0">@</text><text x="748" y="16">0</text><text x="748" y="32">コ</text><text x="748" y="48">1</text><text x="748" y="64">A</text><text x="748" y="80">ア</text><text x="748" y="96">0</text><text x="748" y="112">E</text><text x="748" y="128">キ</text><text x="748" y="144">1</text><text x="748" y="160">D</text><text x="748" y="176">0</text><text x="748" y="192">オ</text><text x="748" y="208">1</text>
      </g>

      <!-- col 9 (faded) -->
      <g opacity="0.3"><animateTransform attributeName="transform" type="translate" values="0,-190;0,280" dur="3.8s" repeatCount="indefinite" begin="-0.3s"/>
        <text x="778" y="0">ケ</text><text x="778" y="16">1</text><text x="778" y="32">ア</text><text x="778" y="48">0</text><text x="778" y="64">B</text><text x="778" y="80">イ</text><text x="778" y="96">F</text><text x="778" y="112">1</text><text x="778" y="128">カ</text><text x="778" y="144">0</text><text x="778" y="160">$</text><text x="778" y="176">ア</text><text x="778" y="192">3</text><text x="778" y="208">1</text>
      </g>

      <!-- col 10 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-220;0,280" dur="2.7s" repeatCount="indefinite" begin="-1.4s"/>
        <text x="808" y="0">0</text><text x="808" y="16">ウ</text><text x="808" y="32">1</text><text x="808" y="48">コ</text><text x="808" y="64">A</text><text x="808" y="80">0</text><text x="808" y="96">ア</text><text x="808" y="112">1</text><text x="808" y="128">E</text><text x="808" y="144">キ</text><text x="808" y="160">0</text><text x="808" y="176">C</text><text x="808" y="192">1</text><text x="808" y="208">オ</text>
      </g>

      <!-- col 11 (very faded) -->
      <g opacity="0.2"><animateTransform attributeName="transform" type="translate" values="0,-240;0,280" dur="4.8s" repeatCount="indefinite" begin="-2.8s"/>
        <text x="840" y="0">1</text><text x="840" y="16">イ</text><text x="840" y="32">0</text><text x="840" y="48">D</text><text x="840" y="64">ア</text><text x="840" y="80">1</text><text x="840" y="96">F</text><text x="840" y="112">ウ</text><text x="840" y="128">0</text><text x="840" y="144">B</text><text x="840" y="160">カ</text><text x="840" y="176">1</text><text x="840" y="192">ア</text><text x="840" y="208">7</text>
      </g>

      <!-- col 12 -->
      <g><animateTransform attributeName="transform" type="translate" values="0,-200;0,280" dur="3.5s" repeatCount="indefinite" begin="-0.7s"/>
        <text x="872" y="0">E</text><text x="872" y="16">ア</text><text x="872" y="32">1</text><text x="872" y="48">コ</text><text x="872" y="64">0</text><text x="872" y="80">B</text><text x="872" y="96">ア</text><text x="872" y="112">F</text><text x="872" y="128">1</text><text x="872" y="144">ウ</text><text x="872" y="160">A</text><text x="872" y="176">0</text><text x="872" y="192">イ</text><text x="872" y="208">1</text>
      </g>
    </g>

    <!-- Scanline sweep -->
    <rect class="scanline" x="0" y="0" width="900" height="3" fill="#00ff41" opacity="0.06"/>

    <!-- Italian flag top stripe -->
    <rect x="0" y="0" width="900" height="5" fill="url(#it-flag)" opacity="0.85"/>

    <!-- Ambient green center glow -->
    <ellipse cx="450" cy="150" rx="220" ry="90" fill="#00ff41" opacity="0.03" filter="url(#soft-glow)"/>

    <!-- Glitch shadow layers (red / cyan) behind name -->
    <text class="name-red" x="450" y="152" text-anchor="middle"
          font-family="'Cinzel',Georgia,serif" font-size="80" font-weight="900"
          fill="#ff003c" opacity="0.5">SIMO</text>
    <text class="name-cyan" x="450" y="152" text-anchor="middle"
          font-family="'Cinzel',Georgia,serif" font-size="80" font-weight="900"
          fill="#00e5ff" opacity="0.5">SIMO</text>

    <!-- Main name -->
    <text class="name-main" x="450" y="152" text-anchor="middle"
          font-family="'Cinzel',Georgia,serif" font-size="80" font-weight="900"
          fill="url(#gold-grad)" filter="url(#glow-gold)">SIMO</text>

    <!-- Subtitle -->
    <text class="subtitle" x="450" y="188" text-anchor="middle"
          font-family="'Share Tech Mono',monospace" font-size="13"
          letter-spacing="7" fill="#00ff41" filter="url(#glow-green)">BACKEND &amp; CYBERSECURITY DEVELOPER</text>

    <!-- Terminal tagline -->
    <text class="tagline" x="450" y="222" text-anchor="middle"
          font-family="'Share Tech Mono',monospace" font-size="11"
          fill="#4a8a4a" letter-spacing="2">root@simo:~$ ./build-the-future.sh</text>
    <text class="tagline cursor" x="670" y="222"
          font-family="'Share Tech Mono',monospace" font-size="11"
          fill="#00ff41">█</text>

    <!-- Location -->
    <text x="450" y="248" text-anchor="middle"
          font-family="'Share Tech Mono',monospace" font-size="10"
          fill="#2d5c2d" letter-spacing="3">🇮🇹  CATANIA, SICILY  ·  ARYAPLUS.IT</text>

    <!-- Italian flag bottom stripe -->
    <rect x="0" y="275" width="900" height="5" fill="url(#it-flag)" opacity="0.85"/>

    <!-- Gold corner brackets -->
    <path d="M0,35 L0,0 L35,0"      fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M865,0 L900,0 L900,35" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M0,245 L0,280 L35,280" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M865,280 L900,280 L900,245" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Outer border glow -->
    <rect x="0.5" y="5" width="899" height="269" fill="none" stroke="#00ff41" stroke-width="0.8" stroke-opacity="0.15"/>

  </g>
</svg>
